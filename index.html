<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atmosphere Sky 第三方科學測試報告</title>
  <meta name="description" content="Amway Atmosphere Sky 空氣清淨機第三方科學測試重點報告，中文版網頁入口。">
  <style>
    :root {
      --bg: #eff4fb;
      --text: #162033;
      --muted: #617086;
      --line: rgba(24, 43, 77, 0.12);
      --primary: #1d4ed8;
      --primary-deep: #143a95;
      --surface: rgba(255,255,255,0.84);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(45, 212, 191, 0.15), transparent 26%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      line-height: 1.8;
    }
    .wrap {
      width: min(calc(100% - 32px), 1080px);
      margin: 0 auto;
      padding: 44px 0 56px;
    }
    .hero {
      border: 1px solid rgba(255,255,255,0.44);
      border-radius: 32px;
      padding: 36px;
      background: linear-gradient(135deg, rgba(13, 42, 92, 0.96), rgba(29, 78, 216, 0.9) 52%, rgba(15, 118, 110, 0.8));
      color: #fff;
      box-shadow: 0 30px 70px rgba(23, 62, 166, 0.25);
    }
    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-size: 0.92rem;
    }
    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }
    .lead {
      max-width: 62ch;
      color: rgba(255,255,255,0.86);
      margin: 0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.12);
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      background: var(--surface);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }
    .card strong {
      display: block;
      margin-bottom: 10px;
      color: var(--primary-deep);
      font-size: 1.08rem;
    }
    .card p { margin: 0; color: var(--muted); }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .hero, .card { padding: 24px; }
    }
    @media (max-width: 640px) {
      .wrap { width: min(calc(100% - 20px), 1080px); padding-top: 20px; }
      .actions a { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">中文網頁版入口</div>
      <h1>Amway Atmosphere Sky 空氣清淨機<br>第三方科學測試重點報告</h1>
      <p class="lead">已將英文來源整理成中文重點，並重新做成較完整的展示版型。內容以第三方公開資料為優先，方便直接閱讀與分享。</p>
      <div class="actions">
        <a href="./amway-atmosphere-sky-third-party-report.html">開啟完整報告</a>
        <a href="https://www.ahamdir.com/room-air-cleaners/" target="_blank" rel="noreferrer">查看 AHAM 英文來源</a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <strong>可直接引用的重點</strong>
        <p>目前最穩定的第三方證據是 AHAM Verifide 的 CADR 名錄資料，適合做正式引用。</p>
      </article>
      <article class="card">
        <strong>需要保留的說法</strong>
        <p>99.99% 過濾效率與 0.007 微米的英文宣稱很常見，但本次未確認到可公開下載的原始第三方報告。</p>
      </article>
      <article class="card">
        <strong>目前資料缺口</strong>
        <p>尚未找到具完整方法說明的英文第三方公開噪音實測，因此不建議將規格表數字視為科學驗證結果。</p>
      </article>
    </section>
  </div>
</body>
</html>
